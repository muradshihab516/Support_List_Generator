<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Gap Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .input-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .threshold-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .threshold-box label {
            color: #ccc;
        }

        .threshold-box input {
            width: 60px;
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            font-size: 16px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-clear {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .stats-bar {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .result-card.critical {
            border: 2px solid #f85149;
            box-shadow: 0 0 20px rgba(248, 81, 73, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
        }

        .btn-copy {
            padding: 8px 15px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-copy:hover {
            background: #2ea043;
        }

        .notice-box, .footer-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        .list-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            max-height: 500px;
            overflow-y: auto;
        }

        /* ✅ নতুন সুন্দর রো ডিজাইন */
        .row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            border-left: 4px solid #00d9ff;
            transition: all 0.3s ease;
        }

        .row:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .serial {
            color: #888;
            font-weight: bold;
            min-width: 35px;
            font-size: 14px;
        }

        .name-text {
            color: #00d9ff;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }

        .gap-info {
            color: #f85149;
            font-size: 13px;
            margin-left: 15px;
            background: rgba(248, 81, 73, 0.15);
            padding: 4px 10px;
            border-radius: 15px;
            white-space: nowrap;
        }

        .link-numbers {
            color: #8b949e;
            font-size: 12px;
            margin-left: 10px;
        }

        .btn-remove {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-remove:hover {
            background: #ff1744;
            transform: scale(1.15);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .empty-message {
            text-align: center;
            color: #8b949e;
            padding: 20px;
        }

        /* স্ক্রলবার স্টাইল */
        .list-box::-webkit-scrollbar {
            width: 8px;
        }

        .list-box::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .list-box::-webkit-scrollbar-thumb {
            background: #00d9ff;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .controls {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            .row {
                flex-wrap: wrap;
                padding: 10px;
            }
            .gap-info {
                margin-left: 35px;
                margin-top: 8px;
            }
            .link-numbers {
                display: block;
                margin-left: 35px;
                margin-top: 5px;
                width: 100%;
            }
            .btn-remove {
                position: absolute;
                right: 25px;
            }
            .row {
                position: relative;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Support Gap Finder</h1>

        <div class="input-section">
            <textarea id="inputText" placeholder="এখানে গ্যাপ লিস্ট পেস্ট করুন...

উদাহরণ:
Link No 13:- তে যারা কমেন্ট করেননি
1. Rasel Sheikh
2. নিস্তব্ধ শহর
3. AK AS H

Link No 26:- তে যারা কমেন্ট করেননি
1. Rasel Sheikh
2. Mijan Ahmed"></textarea>

            <div class="controls">
                <div class="threshold-box">
                    <label>থ্রেশহোল্ড:</label>
                    <input type="number" id="threshold" value="3" min="1">
                </div>
                <button class="btn btn-primary" onclick="processData()">🔎 বিশ্লেষণ করুন</button>
                <button class="btn btn-clear" onclick="clearAll()">🗑️ ক্লিয়ার</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="sLink">0</div>
                <div class="stat-label">মোট লিংক</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="sMem">0</div>
                <div class="stat-label">মোট মেম্বার</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="sMain">0</div>
                <div class="stat-label">মেইন লিস্ট</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="sOther">0</div>
                <div class="stat-label">অন্যান্য</div>
            </div>
        </div>

        <div id="resultArea"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const HEADER_TEXT = `.  .  . 🚨 অফিসিয়াল নোটিশ 🚨 .  .  . 
       🚫  KICKED OUT ALERT  🚫

৩টির বেশি পোস্ট সাপোর্ট গ্যাপ ও কমেন্ট না করায়
গ্রুপ রুলস অনুযায়ী সংশ্লিষ্ট আইডিগুলোকে Support Link Group থেকে রিমুভ করা হয়েছে।

Gap Supporters List ⬇️`;

        const FOOTER_TEXT = `📢 পুনরায় এড হতে হলে আপনাদেরকে —
✅ গ্যাপ যাওয়া সব পোস্টে সাপোর্ট কমপ্লিট করতে হবে
✅ একদিন নিজের লিংক না দিয়ে ফ্রি সাপোর্ট দিতে হবে

⚠️ সাপোর্ট সম্পুর্ন করে এডমিনকে জানানোর পরেই পুনরায় আপনাদেরকে এড করা হবে।`;

        let mainList = [];
        let otherList = [];
        let currentThreshold = 3;
        let totalLinks = 0;

        function processData() {
            const text = document.getElementById('inputText').value;
            currentThreshold = parseInt(document.getElementById('threshold').value) || 3;

            if (!text.trim()) {
                showToast("⚠️ বক্সে ডাটা পেস্ট করুন!");
                return;
            }

            const lines = text.split('\n');
            let currentLink = '';
            let database = {};
            let linksFound = new Set();

            lines.forEach(line => {
                line = line.trim();

                const linkMatch = line.match(/Link\s*(?:No)?[-:\s]*(\d+)/i);
                if (linkMatch) {
                    currentLink = linkMatch[1];
                    linksFound.add(currentLink);
                    return;
                }

                if (line.includes('মোট গ্যাপ') || line.includes('তে যারা কমেন্ট') || line === '') {
                    return;
                }

                const nameMatch = line.match(/^\d+[\.\)]\s*(.+)$/);
                if (nameMatch && currentLink) {
                    let name = nameMatch[1].trim();

                    if (name && !name.startsWith('@')) {
                        name = '@' + name;
                    }

                    if (name && name !== '@') {
                        if (!database[name]) database[name] = [];
                        if (!database[name].includes(currentLink)) {
                            database[name].push(currentLink);
                        }
                    }
                }
            });

            const sortedNames = Object.keys(database).sort((a, b) => database[b].length - database[a].length);

            mainList = [];
            otherList = [];

            sortedNames.forEach((name) => {
                const gaps = database[name];
                const count = gaps.length;

                const item = {
                    name: name,
                    count: count,
                    links: gaps.slice()
                };

                if (count >= currentThreshold) {
                    mainList.push(item);
                } else {
                    otherList.push(item);
                }
            });

            totalLinks = linksFound.size;

            updateStats();
            renderResults();

            showToast(`✅ মোট ${sortedNames.length} জনের লিস্ট তৈরি হয়েছে!`);
        }

        function updateStats() {
            document.getElementById('sLink').innerText = totalLinks;
            document.getElementById('sMem').innerText = mainList.length + otherList.length;
            document.getElementById('sMain').innerText = mainList.length;
            document.getElementById('sOther').innerText = otherList.length;
            document.getElementById('statsBar').style.display = 'grid';
        }

        function renderResults() {
            const resultDiv = document.getElementById('resultArea');
            resultDiv.innerHTML = '';

            // মেইন লিস্ট
            if (mainList.length > 0) {
                let mainHtml = '';
                mainList.forEach((item, index) => {
                    mainHtml += `
                        <div class="row" id="main-${index}">
                            <span class="serial">${index + 1}.</span>
                            <span class="name-text">${item.name}</span>
                            <span class="gap-info">${item.count} পোস্ট গ্যাপ</span>
                            <span class="link-numbers">Link: ${item.links.join(', ')}</span>
                            <button class="btn-remove" onclick="removeFromMain(${index})" title="বাদ দিন">✕</button>
                        </div>`;
                });

                resultDiv.innerHTML += `
                    <div class="result-card critical">
                        <div class="card-header">
                            <span class="card-title" style="color:#f85149">🚨 মেইন রেজাল্ট (${mainList.length} জন)</span>
                            <button class="btn-copy" onclick="copyMainList()">📋 কপি করুন</button>
                        </div>
                        <div class="notice-box">${HEADER_TEXT}</div>
                        <div class="list-box" id="mainListBox">${mainHtml}</div>
                        <div class="footer-box">${FOOTER_TEXT}</div>
                    </div>
                `;
            } else {
                resultDiv.innerHTML += `
                    <div class="result-card">
                        <div class="card-header"><span class="card-title">🚨 মেইন রেজাল্ট</span></div>
                        <div class="empty-message">কাউকে পাওয়া যায়নি</div>
                    </div>`;
            }

            // অন্যান্য লিস্ট
            if (otherList.length > 0) {
                let otherHtml = '';
                otherList.forEach((item, index) => {
                    otherHtml += `
                        <div class="row" id="other-${index}">
                            <span class="serial">${index + 1}.</span>
                            <span class="name-text">${item.name}</span>
                            <span class="gap-info">${item.count} পোস্ট গ্যাপ</span>
                            <span class="link-numbers">Link: ${item.links.join(', ')}</span>
                            <button class="btn-remove" onclick="removeFromOther(${index})" title="বাদ দিন">✕</button>
                        </div>`;
                });

                resultDiv.innerHTML += `
                    <div class="result-card">
                        <div class="card-header">
                            <span class="card-title" style="color:#d29922">🟡 অন্যান্য গ্যাপ (${otherList.length} জন)</span>
                            <button class="btn-copy" onclick="copyOtherList()">📋 কপি করুন</button>
                        </div>
                        <div class="list-box" id="otherListBox">${otherHtml}</div>
                    </div>
                `;
            }
        }

        function removeFromMain(index) {
            const removed = mainList.splice(index, 1)[0];
            showToast(`❌ ${removed.name} বাদ দেওয়া হয়েছে`);
            updateStats();
            renderResults();
        }

        function removeFromOther(index) {
            const removed = otherList.splice(index, 1)[0];
            showToast(`❌ ${removed.name} বাদ দেওয়া হয়েছে`);
            updateStats();
            renderResults();
        }

        function copyMainList() {
            if (mainList.length === 0) {
                showToast("⚠️ লিস্ট খালি!");
                return;
            }

            let body = '';
            mainList.forEach((item, index) => {
                body += `${index + 1}. ${item.name} সাপোর্ট গ্যাপ ${item.count} পোস্ট (${item.links.join(', ')})\n\n`;
            });

            const text = `${HEADER_TEXT}\n\n${body}${FOOTER_TEXT}`;
            copyToClipboard(text);
        }

        function copyOtherList() {
            if (otherList.length === 0) {
                showToast("⚠️ লিস্ট খালি!");
                return;
            }

            let body = '';
            otherList.forEach((item, index) => {
                body += `${index + 1}. ${item.name} সাপোর্ট গ্যাপ ${item.count} পোস্ট (${item.links.join(', ')})\n\n`;
            });

            const text = `🟡 Warning List (Less than ${currentThreshold} gaps)\n\n${body}`;
            copyToClipboard(text);
        }

        function copyToClipboard(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast("📋 কপি হয়েছে!"))
                .catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast("📋 কপি হয়েছে!");
                });
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('resultArea').innerHTML = '';
            document.getElementById('statsBar').style.display = 'none';
            mainList = [];
            otherList = [];
            showToast("🗑️ সব ক্লিয়ার করা হয়েছে");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
